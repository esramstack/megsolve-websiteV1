2 days ahead), saved $20,000 in avoided downtime, zero operational disruptions.",tech:["Ceridian Dayforce","HCM Systems"],timeline:"21 days"},{id:3,client:"Therabody",title:"Zoom Rooms Enhancement",tag:"Unified Comms",summary:"Upgraded 14 Zoom meeting rooms within 2 weeks before office reopening.",result:"95% satisfaction",challenge:"Audio distortions, echo, video freezing across Zoom Rooms. Tight 2-week deadline coincided with employees returning from remote work.",solution:"Room-wise checklists for 14 locations, Zoom and Apple software updates, audio optimization, aspect ratio adjustments, compliance documentation.",impact:"Satisfaction rose from 75% to 95%. AV rating improved 3.5 to 4.8/5. Technical issues dropped from 2/day to 0.5/day.",tech:["Zoom Rooms","Mac Mini","iPad","Apple TV"],timeline:"2 weeks"},{id:4,client:"GEMA / SHI / Gwinnett",title:"Webex Calling Implementation",tag:"Unified Comms",summary:"Cisco Webex Calling across multiple organizations with migration, SSO, and DID porting.",result:"$65K budget, on-time",challenge:"Multiple organizations needed Webex Calling with user provisioning, PSTN configuration, migration strategies, and UC audits.",solution:"Control Hub configuration, Local Gateway SIP, SSO with Azure AD, DID porting, UC audits using Pivot/CC Uplinks, Solution Assessment Documents.",impact:"Deployed to 12 departments at Gwinnett County, completed GEMA migration with full sign-off, delivered SAD for SHI.",tech:["Cisco Webex","Azure AD","SIP","CUBE"],timeline:"4 months"},{id:5,client:"UCSF Benioff",title:"Desktop & Workstation Revitalization",tag:"Hardware",summary:"400+ desktops and laptops staged and installed in a children's hospital.",result:"400+ units deployed",challenge:"Large-scale hardware overhaul at a children's hospital with scoping errors requiring swift strategic adjustments.",solution:"Team divided by expertise, off-peak waste disposal, separate staging/installation rooms, simultaneous multi-PC installation, night-shift scheduling.",impact:"Successfully deployed 400+ units with automation. Built trust despite initial setbacks. CRM documentation for future reference.",tech:["Windows Imaging","Automation","CRM"],timeline:"3.5 months"},{id:6,client:"Gursey Schneider",title:"Verkada Security Deployment",tag:"Security",summary:"Access control and surveillance across 5 California office locations.",result:"30% fewer incidents",challenge:"Deficiencies in access control and surveillance across five offices left the firm vulnerable.",solution:"Site-specific assessments, Verkada badge readers and cameras, data drops with battery backup, centralized monitoring, staff training.",impact:"30% decrease in security incidents, 25% faster response time, 95% issue detection rate.",tech:["Verkada","Access Control","Surveillance"],timeline:"Multi-site"},{id:7,client:"Greenball Corp",title:"Verkada Camera & Network Upgrade",tag:"Security",summary:"Replaced legacy surveillance with Verkada HD cameras at factory facility.",result:"30% more coverage",challenge:"Outdated cameras, obsolete NVRs, and insufficient network infrastructure compromised factory security.",solution:"5 indoor dome + 3 outdoor Verkada cameras, replaced NVRs with 24-port switches, new Cat6 from dock to MDF.",impact:"30% coverage increase, 40% network performance boost, completed in 5 working days.",tech:["Verkada","Cat6","Switches"],timeline:"5 days"},{id:9,client:"US Restaurant Chain",title:"DoorDash Integration with POS",tag:"Software Development",summary:"Integrated DoorDash ordering directly into the in-store POS system for a US restaurant operation.",result:"Unified order flow",challenge:"Online DoorDash orders lived in a separate tablet ecosystem, forcing staff to manually re-enter orders into the POS, causing delays, errors, and missed tickets during rush hours.",solution:"Built a direct integration between DoorDash and the POS system with automatic order injection, menu sync, item mapping, and real-time status updates back to the delivery platform.",impact:"Eliminated manual re-entry entirely, reduced order errors, and cut ticket handling time so staff focus on food instead of data entry.",tech:["DoorDash API","POS Integration","Menu Sync","Webhooks"],timeline:"Completed"},{id:10,client:"MSK Aesthetics",title:"Inventory Management Application",tag:"Software Development",summary:"Custom inventory application for MSK's product line across clinic branches.",result:"Full stock visibility",challenge:"Product inventory across branches was tracked manually, making it hard to know real stock levels, reconcile sales across cash, POS, and account channels, or plan restocking.",solution:"Built an inventory application covering the full MSK product line with per-branch stock tracking, sales recording by payment channel, and monthly closing reports showing units sold, revenue, and remaining stock.",impact:"Real-time stock visibility across branches, accurate monthly closings, and data-backed restocking decisions.",tech:["Inventory System","Multi-Branch","Reporting"],timeline:"Completed"},{id:11,client:"ZNC Mardan",title:"Fee Management System",tag:"Software Development",summary:"Digital fee management platform for Zia Nursing College, Mardan.",result:"Digitized fee operations",challenge:"Student fee collection, tracking, and reconciliation ran on paper registers and spreadsheets, creating errors, disputes, and zero real-time visibility into receivables.",solution:"Built a fee management platform handling student records, fee schedules, payment tracking, receipts, and outstanding balance reporting for administration.",impact:"Complete digital record of every payment, instant visibility into outstanding fees, and administration hours saved every week.",tech:["Next.js","Supabase","Vercel"],timeline:"Completed"},{id:8,client:"Morley Builders",title:"Cisco Meraki Wi-Fi Deployment",tag:"Infrastructure",summary:"Eliminated dead zones across 3 construction site locations.",result:"Dead zones eliminated",challenge
